<!DOCTYPE html>
<html lang="bn"> 
<head> 
    <meta charset="UTF-8" /> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" /> 
    <title>মাদ্রাসা ম্যানেজমেন্ট সিস্টেম</title>    
    
    <!-- ফেভিকন আইকন --> 
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1B-tFRZng9hiqmoHVOnioQ_EdWt1vJ6h9=w1000" />
    <link href="https://fonts.googleapis.com/css2?family=SolaimanLipi&display=swap" rel="stylesheet" />
    
    <style>
        /* গ্লোবাল স্টাইল এবং ফন্ট ফিক্স */ 
        * { 
            box-sizing: border-box; 
            font-family: 'SolaimanLipi', sans-serif !important;  
        }
        html, body { 
            margin: 0;     
            padding: 0; 
            height: 97%; 
            width: 97%; 
            overflow: hidden; 
            background: #0f172a;
            color: #f8fafc; 
        }
        
        /* ব্যাকগ্রাউন্ড ওভারলে ও কার্ড ডিজাইন */
        .login-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 98%; 
            height: 98%; 
            display: none; 
            justify-content: center; 
            align-items: center; 
            z-index: 99999; 
            padding: 20px; 
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }
        .login-overlay.show { display: flex; }
        .login-card { 
            background: rgba(30, 41, 59, 0.75); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 40px 35px; 
            border-radius: 24px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            width: 100%; 
            max-width: 440px; 
            text-align: center; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            transition: transform 0.3s ease;
        }
        .madrasa-logo { 
            width: 95px; 
            height: 95px; 
            margin-bottom: 20px; 
            filter: drop-shadow(0px 8px 16px rgba(0, 0, 0, 0.3)); 
            object-fit: contain; 
        }
        .login-card h2 { 
            margin: 0 0 10px 0; 
            font-size: 26px; 
            font-weight: 600;
            color: #38bdf8; 
            letter-spacing: 0.5px;
        }
        .login-card p { 
            margin: 0 0 25px 0; 
            color: #94a3b8; 
            font-size: 15px; 
            line-height: 1.5;
        }
        
        /* অ্যালার্ট ও এরর মেসেজ */
        .error-msg { 
            background: rgba(239, 68, 68, 0.15); 
            border: 1px solid rgba(239, 68, 68, 0.3); 
            color: #f87171; 
            padding: 12px; 
            border-radius: 12px; 
            font-size: 14px; 
            margin-bottom: 20px; 
            display: none; 
            text-align: center; 
            animation: fadeIn 0.3s ease;
        }
        
        /* ইনপুট গ্রুপ স্টাইল */
        .input-group { 
            margin-bottom: 22px; 
            text-align: left; 
        }
        .input-group label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 14px; 
            color: #cbd5e1; 
            font-weight: 500;
        }
        .input-group input { 
            width: 100%; 
            padding: 14px 18px; 
            background: rgba(15, 23, 42, 0.6); 
            border: 1px solid rgba(71, 85, 105, 0.7); 
            border-radius: 12px; 
            color: #fff; 
            font-size: 16px; 
            outline: none; 
            transition: all 0.25s ease; 
        }
        .input-group input::placeholder {
            color: #64748b;
            font-family: 'SolaimanLipi', sans-serif;
        }
        .input-group input:focus { 
            border-color: #38bdf8; 
            background: #0f172a;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15); 
        }
        
        /* আধুনিক বাটন ডিজাইন */
        .login-btn { 
            width: 100%; 
            padding: 20px; 
            background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%); 
            border: none; 
            border-radius: 12px; 
            color: white; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            margin-top: 5px; 
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.3);
        }
        .login-btn:hover { 
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(2, 132, 199, 0.4);
        }
        .login-btn:active { transform: translateY(1px); }
        .login-btn:disabled {
            background: #334155;
            color: #94a3b8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* বুট-টাইম সাইলেন্ট সেশন-চেক লোডার */
        #bootLoader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            gap: 14px; z-index: 100000;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }
        #bootLoader .spinner {
            width: 38px; height: 38px;
            border: 3px solid rgba(148, 163, 184, 0.25);
            border-top-color: #38bdf8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        #bootLoader span { color: #94a3b8; font-size: 14px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* মেইন কনটেইনার ও আইফ্রেম (নিখুঁত মার্জিন ও প্যাডিং ফিক্স) */
        .main-container { 
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden; 
            display: none; 
            /* মোবাইল ফোনের ঘড়ি/নচ এবং নিচের নেভিগেশন বারের সেফ জোন প্যাডিং */
            padding-top: max(37px, env(safe-area-inset-top)); 
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            background-color: #0f172a;
        }
        iframe { 
            width: 98%; 
            height: 98%; 
            border: none; 
            display: block;
            background-color: #0f172a; 
        }

        /* মোবাইলের জন্য স্পষ্ট দেখা যাওয়ার মতো রেসপন্সিভ লগ-আউট বাটন */
        #logoutBtn {
            position: fixed;
            top: max(10px, calc(env(safe-area-inset-top) + 8px)); 
            right: 10px;
            z-index: 999999; /* যেন সবার উপরে স্পষ্ট থাকে */
            background: #ef4444;
            color: #ffffff;
            border: 2px solid #ffffff;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.6);
            transition: all 0.2s ease;
        }
        #logoutBtn:hover { 
            transform: scale(1.1);
            background: #dc2626;
        }
        #logoutBtn:active { transform: scale(0.92); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="bootLoader">
        <div class="spinner"></div>
        <span>সেশন যাচাই করা হচ্ছে…</span>
    </div>

    <div class="login-overlay" id="loginOverlay">
        <div class="login-card" id="loginCardContainer">
            <img src="https://lh3.googleusercontent.com/d/1B-tFRZng9hiqmoHVOnioQ_EdWt1vJ6h9=w1000" alt="Madrasa Logo" class="madrasa-logo" />
            <h2>লাইসেন্স ভেরিফিকেশন</h2>
            <p>সফটওয়্যারটি ব্যবহার করতে অনুগ্রহ করে ইউজারনেম এবং পাসওয়ার্ড দিন</p>
            
            <div class="error-msg" id="errorBlock"></div>
            
            <div class="input-group">
                <label for="username">ইউজারনেম / ফোন নম্বর</label>
                <input type="text" id="username" placeholder="যেমন: aliahmad" required /> 
            </div>
            
            <div class="input-group">
                <label for="licenseKey">পাসওয়ার্ড</label>
                <input type="password" id="licenseKey" placeholder="যেমন: aliahmad@94" required />
            </div>
            
            <button class="login-btn" id="loginBtn" onclick="performSecureLogin()">🔑 যাচাই ও সক্রিয় করুন</button>
        </div>
    </div>

    <div class="main-container" id="mainAppContainer"> 
        <iframe id="appIframe" src=""></iframe>
    </div>

    <!-- টপ-রাইট লাল পাওয়ার পাওয়ার বাটন -->
    <button id="logoutBtn" onclick="performLogout()" title="লগ-আউট">⏻</button>

    <script>
        var GOOGLE_SCRIPT_API = "https://script.google.com/macros/s/AKfycbzZ731W3WfvNgB7vbKg6N1mcA2Wb0hiHbDuu5VyZlPRoa3sugW0t053uBotlgObIzE7/exec";
        var SESSION_STORAGE_KEY = 'sms_session_token';

        function getSavedSession() {
            try { return localStorage.getItem(SESSION_STORAGE_KEY); } catch (e) { return null; }
        }
        function saveSession(token) {
            try { if (token) localStorage.setItem(SESSION_STORAGE_KEY, token); } catch (e) {}
        }
        function clearSavedSession() {
            try { localStorage.removeItem(SESSION_STORAGE_KEY); } catch (e) {}
        }

        function hideBootLoader() {
            var loader = document.getElementById('bootLoader');
            if (loader) loader.style.display = 'none';
        }
        function showLoginForm() {
            hideBootLoader();
            document.getElementById('loginOverlay').classList.add('show');
        }
        function openApp() {
            hideBootLoader();
            document.getElementById('loginOverlay').classList.remove('show');
            document.getElementById('appIframe').src = GOOGLE_SCRIPT_API + "?loadApp=true";
            document.getElementById('mainAppContainer').style.display = 'block';
            document.getElementById('logoutBtn').style.display = 'flex';
        }

        window.addEventListener('DOMContentLoaded', function() {
            var savedToken = getSavedSession();
            if (!savedToken) {
                showLoginForm();
                return;
            }

            fetch(GOOGLE_SCRIPT_API + "?session=" + encodeURIComponent(savedToken))
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data && data.success) {
                        if (data.session) saveSession(data.session);
                        openApp();
                    } else {
                        clearSavedSession();
                        showLoginForm();
                    }
                })
                .catch(function() {
                    showLoginForm();
                });
        });

        function showMsg(text) {
            var errBlock = document.getElementById('errorBlock');
            errBlock.innerText = text;
            errBlock.style.display = 'block';
        }

        function performSecureLogin() {
            var userField = document.getElementById('username').value.trim();
            var keyField  = document.getElementById('licenseKey').value.trim();
            var btn = document.getElementById('loginBtn');
            var errBlock = document.getElementById('errorBlock');

            if (!userField || !keyField) {
                showMsg('❌ অনুগ্রহ করে ইউজারনেম এবং পাসওয়ার্ড দুটোই সঠিকভাবে লিখুন।');
                return;
            }

            errBlock.style.display = 'none';
            btn.innerText = "সার্ভার যাচাই করা হচ্ছে...";
            btn.disabled = true;

            var requestUrl = GOOGLE_SCRIPT_API + "?user=" + encodeURIComponent(userField) + "&key=" + encodeURIComponent(keyField);

            fetch(requestUrl)
                .then(response => response.json())
                .then(data => {
                    if (data && data.success) {
                        btn.innerText = "🎉 লগইন সফল! ড্যাশবোর্ড ওপেন হচ্ছে...";
                        if (data.session) saveSession(data.session);
                        openApp();
                    } else {
                        showMsg("❌ " + (data.error ? data.error : "ভুল ইউজার আইডি অথবা পাসওয়ার্ড!"));
                        btn.innerText = "🔑 যাচাই ও সক্রিয় করুন";
                        btn.disabled = false;
                    }
                })
                .catch(err => {
                    showMsg("❌ সার্ভার সংযোগে সমস্যা হয়েছে! আবার চেষ্টা করুন।");
                    btn.innerText = "🔑 যাচাই ও সক্রিয় করুন";
                    btn.disabled = false;
                });
        }

        function performLogout() {
            if (!confirm('আপনি কি লগ-আউট করতে চান?')) return;
            clearSavedSession();
            document.getElementById('logoutBtn').style.display = 'none';
            document.getElementById('mainAppContainer').style.display = 'none';
            document.getElementById('appIframe').src = '';
            
            document.getElementById('username').value = '';
            document.getElementById('licenseKey').value = '';
            document.getElementById('errorBlock').style.display = 'none';
            showLoginForm();
        }

        document.getElementById('licenseKey').addEventListener('keypress', function(e) { if (e.key === 'Enter') { performSecureLogin(); } });
        document.getElementById('username').addEventListener('keypress', function(e) { if (e.key === 'Enter') { performSecureLogin(); } });
    </script>
</body>
</html>
